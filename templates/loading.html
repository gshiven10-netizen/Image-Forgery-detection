<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyzing Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loader.css') }}">
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p id="status">Initializing analysis...</p>
    </div>

    <script>
        const messages = [
            "Uploading image to the system...",
            "Preprocessing image for classification...",
            "Loading trained .h5 model...",
            "Detecting copy-move and splicing patterns...",
            "Preparing result visualization..."
        ];

        let i = 0;
        const status = document.getElementById("status");

        const interval = setInterval(() => {
            if (i < messages.length) {
                status.innerText = messages[i];
                i++;
            } else {
                clearInterval(interval);
                window.location.href = "/result/{{ filename }}";
            }
        }, 1200);
    </script>
</body>
</html>
